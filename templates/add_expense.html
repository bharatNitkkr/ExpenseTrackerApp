{% extends "base.html" %}

{% block content %}

<h1>Add Expense</h1>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Amount
        </label>

        <input
        type="number"
        class="form-control"
        name="amount"
        required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Category
        </label>

        <input
        type="text"
        class="form-control"
        name="category"
        required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <input
        type="text"
        class="form-control"
        name="description"
        required>

    </div>


    <button
        type="submit"
        class="btn btn-primary">

        Add Expense

    </button>

</form>

{% endblock %}
