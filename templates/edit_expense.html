<!DOCTYPE html>
<html>

<head>

    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Edit Expense</h1>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
            type="number"
            class="form-control"
            name="amount"
            value="{{ expense['amount'] }}"
            required>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <input
            type="text"
            class="form-control"
            name="category"
            value="{{ expense['category'] }}"
            required>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <input
            type="text"
            class="form-control"
            name="description"
            value="{{ expense['description'] }}"
            required>

        </div>


        <button
        type="submit"
        class="btn btn-success">

            Update Expense

        </button>

    </form>

</div>

</body>

</html>
